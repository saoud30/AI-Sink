<svg width="50" height="50" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sleek, futuristic gradient for the outer circle -->
    <linearGradient id="aisinkGradient" x1="0" y1="0" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0D0D" />
      <stop offset="100%" stop-color="#4F4F4F" />
    </linearGradient>

    <!-- Soft glow for the central AI node -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#00D1FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#00D1FF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Outer Circle: Symbolizes a network or search framework -->
  <circle cx="25" cy="25" r="24" fill="url(#aisinkGradient)" stroke="#1A1A1A" stroke-width="1" />

  <!-- Futuristic Circuit-like Path: Represents AI connectivity and data flow -->
  <path d="M14 25C14 19 19 14 25 14C31 14 36 19 36 25C36 30 31 36 25 36C21 36 17 33 16 30" 
        stroke="#00D1FF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Inner Glow: AI core, symbolizing intelligence and processing -->
  <circle cx="25" cy="25" r="10" fill="url(#glow)" />

  <!-- Central AI Node: Represents the intelligence hub (AI core) -->
  <circle cx="25" cy="25" r="5" fill="#00D1FF" />

  <!-- Data Line: Represents search or query flow -->
  <line x1="10" y1="40" x2="40" y2="10" stroke="#00D1FF" stroke-width="1" stroke-dasharray="2 2" stroke-linecap="round" opacity="0.8"/>

  <!-- AI-SINK Branding or Icon Accent -->
  <text x="50%" y="90%" fill="#FFFFFF" font-size="5" font-family="Arial, sans-serif" text-anchor="middle" opacity="0.8">AI-SINK</text>
</svg>
